<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.bunny.net/css2?family=Inter:wght@500;600;700;800&family=Playfair+Display:ital,wght@1,500&display=swap');
html,body{margin:0;padding:0}
body{
  background:radial-gradient(70% 100% at 30% 0%, rgba(212,165,116,.10) 0%, transparent 60%),
             linear-gradient(180deg, #1a1411 0%, #0c0908 100%);
  color:#e8d9c4;font-family:Inter,sans-serif;padding:24px;margin:0;
  display:flex;align-items:center;gap:28px;min-height:170px;box-sizing:border-box;
}

/* Mark — concentric arches forming an "H", with aurora gradient */
.tile{
  position:relative;
  width:108px;height:108px;
  border-radius:24px;
  background:
    radial-gradient(120% 100% at 0% 0%, #2a1f17 0%, transparent 60%),
    linear-gradient(140deg,#0f0a07 0%,#1a1411 50%,#241d18 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 1px 0 rgba(232,217,196,.08) inset,
    0 0 0 1px rgba(212,165,116,.18),
    0 8px 28px rgba(0,0,0,.5),
    0 18px 56px rgba(212,165,116,.18),
    0 0 32px rgba(212,165,116,.1);
  overflow:hidden;
}
.tile::before{
  /* aurora */
  content:"";position:absolute;inset:-20%;border-radius:inherit;pointer-events:none;
  background:
    radial-gradient(40% 60% at 80% 20%, rgba(232,192,144,.35) 0%, transparent 60%),
    radial-gradient(50% 60% at 10% 90%, rgba(196,94,44,.18) 0%, transparent 60%);
  filter:blur(8px);
}
.tile svg{position:relative;z-index:1}

.txt{display:flex;flex-direction:column;gap:8px;flex:1}
.brand{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:500;
  font-size:34px;letter-spacing:-.8px;color:#e8d9c4;line-height:1
}
.tag{font-size:13px;color:#a89682;line-height:1.5;max-width:340px}
.label{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#7a6a55;font-weight:700;margin-top:4px}

.divider{width:1px;align-self:stretch;background:linear-gradient(180deg,transparent,rgba(212,165,116,.2),transparent);margin:0 4px}
</style></head>
<body>
  <div class="tile">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <defs>
        <linearGradient id="g" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#f0d4ad"/>
          <stop offset="1" stop-color="#b8885a"/>
        </linearGradient>
      </defs>
      <!-- Clean monogram H — single color, generous proportions -->
      <rect x="14"  y="12" width="8" height="40" rx="4" fill="url(#g)"/>
      <rect x="42"  y="12" width="8" height="40" rx="4" fill="url(#g)"/>
      <rect x="22"  y="28" width="20" height="8" rx="2" fill="url(#g)"/>
    </svg>
  </div>

  <div class="divider"></div>

  <div class="txt">
    <div class="brand">Hverdagsverktøy</div>
    <div class="tag">Praktiske verktøy for hverdagsøkonomi — skatt, lån og kalkyler.</div>
    <div class="label">App mark · cognac monogram · single accent color</div>
  </div>
</body></html>
