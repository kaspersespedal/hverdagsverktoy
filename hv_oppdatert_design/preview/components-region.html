<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap');
html,body{margin:0;padding:0}
body{
  background:radial-gradient(70% 100% at 50% 0%, rgba(212,165,116,.10) 0%, transparent 60%),
             linear-gradient(180deg, #1a1411 0%, #0c0908 100%);
  color:#e8d9c4;font-family:Inter,sans-serif;padding:24px;
  min-height:340px;box-sizing:border-box;
}
.label{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#8a7a64;font-weight:700;margin-bottom:14px}

.region{position:relative;display:inline-block}
.region-cur{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,#241d18 0%,#1a1411 100%);
  border:1px solid rgba(212,165,116,.22);
  border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;
  color:#e8d9c4;font-family:inherit;cursor:pointer;
  box-shadow:0 1px 0 rgba(232,217,196,.05) inset, 0 4px 14px rgba(0,0,0,.35);
}
.chev{font-size:9px;color:#8a7a64;margin-left:4px}

.dd{
  margin-top:8px;
  background:linear-gradient(180deg,#1f1814 0%,#15100d 100%);
  border:1px solid rgba(212,165,116,.18);
  border-radius:11px;min-width:260px;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.5),0 20px 56px rgba(0,0,0,.55),0 0 24px rgba(212,165,116,.05);
}
.lbl{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#7a6a55;padding:12px 16px 6px}
.opt{
  display:flex;align-items:center;gap:12px;padding:9px 16px;
  font-size:13px;font-weight:500;color:#e8d9c4;cursor:pointer;
  background:none;border:none;width:100%;text-align:left;font-family:inherit;
  transition:background .2s ease, color .2s ease;
}
.opt:hover{background:rgba(212,165,116,.08)}
.opt.active{background:rgba(212,165,116,.10);color:#e6c09a;font-weight:600}
.opt.active .flag{box-shadow:0 0 0 1px rgba(212,165,116,.35),0 2px 6px rgba(0,0,0,.4)}
.opt .check{margin-left:auto;color:#d4a574;font-size:11px;opacity:0;transition:opacity .15s ease}
.opt.active .check{opacity:1}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,165,116,.18),transparent);margin:5px 14px}

/* Flag — high-res raster from flagcdn */
.flag{
  width:22px;height:15px;flex-shrink:0;border-radius:2.5px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.45),0 1px 2px rgba(0,0,0,.4),inset 0 0 0 .5px rgba(255,255,255,.06);
  display:block;background:#222;
}
.flag img{display:block;width:100%;height:100%;object-fit:cover}
.region-cur .flag{width:20px;height:14px}
</style></head>
<body>
  <div class="label">Region selector · 10 språk · standard flag-emblems</div>
  <div class="region">
    <button class="region-cur">
      <span class="flag"><img src="https://flagcdn.com/w160/no.png" alt="" srcset="https://flagcdn.com/w320/no.png 2x"></span>
      <span>Norsk</span><span class="chev">▼</span>
    </button>
    <div class="dd">
      <div class="lbl">Hovedspråk</div>
      <button class="opt active">
        <span class="flag"><img src="https://flagcdn.com/w160/no.png" alt="" srcset="https://flagcdn.com/w320/no.png 2x"></span>
        <span>Norsk</span><span class="check">✓</span>
      </button>
      <button class="opt">
        <span class="flag"><img src="https://flagcdn.com/w160/gb.png" alt="" srcset="https://flagcdn.com/w320/gb.png 2x"></span>
        <span>English</span><span class="check">✓</span>
      </button>
      <div class="divider"></div>
      <div class="lbl">Språk i Norge</div>
      <button class="opt">
        <span class="flag"><img src="https://flagcdn.com/w160/pl.png" alt="" srcset="https://flagcdn.com/w320/pl.png 2x"></span>
        <span>Polski</span><span class="check">✓</span>
      </button>
      <button class="opt">
        <span class="flag"><img src="https://flagcdn.com/w160/ua.png" alt="" srcset="https://flagcdn.com/w320/ua.png 2x"></span>
        <span>Українська</span><span class="check">✓</span>
      </button>
      <button class="opt">
        <span class="flag"><img src="https://flagcdn.com/w160/sa.png" alt="" srcset="https://flagcdn.com/w320/sa.png 2x"></span>
        <span>العربية</span><span class="check">✓</span>
      </button>
    </div>
  </div>
</body></html>
