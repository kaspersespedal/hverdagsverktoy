<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.bunny.net/css2?family=Inter:wght@500;600;700&display=swap');
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(70% 100% at 50% 0%, rgba(212,165,116,.10) 0%, transparent 60%),
    linear-gradient(180deg, #1a1411 0%, #0c0908 100%);
  color:#e8d9c4;font-family:Inter,sans-serif;padding:24px 22px;
  min-height:100px;box-sizing:border-box;
}
.label{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#8a7a64;font-weight:700;margin-bottom:14px}

.calc-nav{
  display:flex;gap:4px;
  background:linear-gradient(180deg,#221a14 0%,#1a1411 100%);
  border:1px solid rgba(212,165,116,.18);
  border-radius:14px;padding:5px;
  overflow-x:auto;scrollbar-width:none;
  box-shadow:
    0 1px 0 rgba(232,217,196,.05) inset,
    0 4px 18px rgba(0,0,0,.35),
    0 0 24px rgba(212,165,116,.06);
}
.tab{
  flex:1 1 0;padding:10px 16px;
  border:1px solid transparent;background:transparent;
  border-radius:9px;font-size:13px;font-weight:600;
  color:#8a7a64;font-family:inherit;cursor:pointer;
  white-space:nowrap;text-align:center;
  transition:color .25s var(--ease,cubic-bezier(.22,1,.36,1)),background .25s ease;
}
.tab:hover{color:#c9b89e;background:rgba(212,165,116,.06)}

/* Lighter, glowy active state — gradient cognac with bloom */
.tab.active{
  position:relative;
  background:linear-gradient(180deg,#e8c090 0%,#d4a574 55%,#b8885a 100%);
  color:#1a0e05;
  border:1px solid rgba(212,165,116,.5);
  box-shadow:
    0 1px 0 rgba(255,235,200,.4) inset,
    0 -1px 0 rgba(110,63,31,.35) inset,
    0 0 0 1px rgba(212,165,116,.2),
    0 4px 14px rgba(212,165,116,.35),
    0 8px 24px rgba(212,165,116,.25),
    0 0 22px rgba(232,192,144,.3);
}
.tab.active::after{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 50%);
}
</style></head>
<body>
  <div class="label">Calc-nav · sticky · active tab glows softly</div>
  <div class="calc-nav">
    <button class="tab active">Skatt</button>
    <button class="tab">Boliglån</button>
    <button class="tab">Kalkulator</button>
    <button class="tab">Avgift</button>
    <button class="tab">Personlig</button>
    <button class="tab">Selskap</button>
    <button class="tab">Om</button>
  </div>
</body></html>
