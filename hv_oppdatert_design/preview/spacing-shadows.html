<!doctype html><html><head><meta charset="utf-8">
<style>
body{background:#f7f9fc;color:#0f172a;font-family:Inter,sans-serif;padding:22px;margin:0}
.row{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.card{background:#fff;border-radius:14px;width:170px;height:90px;padding:14px;font-size:12px;color:#3b4963}
.label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#7c8db5;margin-top:10px;font-weight:700}
.stack{display:flex;flex-direction:column}
</style></head>
<body>
  <div class="label" style="margin-top:0;margin-bottom:14px">Shadow stack · 2-layer (close + far)</div>
  <div class="row">
    <div class="stack"><div class="card" style="box-shadow:0 1px 3px rgba(14,40,110,.05),0 4px 18px rgba(14,40,110,.07)">--sh<br>default</div><div class="label">--sh</div></div>
    <div class="stack"><div class="card" style="box-shadow:0 2px 10px rgba(14,40,110,.08),0 20px 56px rgba(14,40,110,.10)">--sh-lg<br>elevated</div><div class="label">--sh-lg</div></div>
    <div class="stack"><div class="card" style="background:#1c1e2e;color:#b0b8cc;box-shadow:0 1px 3px rgba(0,0,0,.4),0 4px 18px rgba(0,0,0,.5)">--sh dark</div><div class="label">dark theme</div></div>
    <div class="stack"><div class="card" style="background:#161226;color:#c4b0e0;box-shadow:0 2px 12px rgba(123,47,247,.15),0 4px 24px rgba(233,30,140,.10)">--sh disco</div><div class="label">disco neon</div></div>
  </div>
</body></html>
