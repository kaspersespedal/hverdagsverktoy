<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr 1fr;background:#000}
section{padding:20px;display:flex;flex-direction:column;gap:12px;min-height:200px}
.tile{padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow-rest);transition:all .3s var(--ease-premium);cursor:pointer}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:rgba(var(--glow-rgb),.4)}
.n{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.d{font-size:11px;color:var(--ink2);margin-top:3px}
.tag{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:4px}
</style></head>
<body>
  <section data-theme="carbon" style="background:var(--bg)"><div class="tag">Carbon · amber glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
  <section data-theme="dark" style="background:var(--bg)"><div class="tag">Dark · indigo glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
  <section data-theme="frost" style="background:var(--bg)"><div class="tag">Frost · indigo glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
  <section data-theme="hendrix" style="background:var(--bg)"><div class="tag">Hendrix · orange glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
  <section data-theme="disco" style="background:var(--bg)"><div class="tag">Disco · magenta glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
  <section data-theme="pink" style="background:var(--bg)"><div class="tag">Pink · rose glow</div><div class="tile"><div class="n">Skatt</div><div class="d">Hover me</div></div></section>
</body></html>
