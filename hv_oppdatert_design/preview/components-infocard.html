<!doctype html><html data-theme="carbon"><head><meta charset="utf-8">
<link rel="stylesheet" href="../components.css">
<style>
body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans)}
.card{max-width:420px;padding:0;overflow:hidden;position:relative}
.hdr{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.desc{font-size:12.5px;color:var(--ink2);margin-top:4px}
.fbtn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:14px;transition:all .25s var(--ease-premium)}
.fbtn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);box-shadow:0 0 12px rgba(var(--glow-rgb),.4)}
.body{padding:0 20px 18px;font-size:13px;color:var(--ink2);line-height:1.65}
.dots{position:absolute;bottom:14px;right:16px;font-size:10px;letter-spacing:2px;color:#f5c445}
.lab{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:14px}
</style></head>
<body>
  <div class="lab">Info-card · same lift + glow on hover · focus btn glows on hover</div>
  <div class="hv-card card">
    <div class="hdr">
      <div>
        <div class="title">Lønn etter skatt</div>
        <div class="desc">Trinnskatt, trygdeavgift og inntektsskatt</div>
      </div>
      <button class="fbtn" aria-label="Fokus">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6V3h3M13 6V3h-3M3 10v3h3M13 10v3h-3"/></svg>
      </button>
    </div>
    <div class="body">5 trinn — fra 1,7 % til 17,8 %. Trygdeavgift 7,6 %, alminnelig inntektsskatt 22 %.</div>
    <div class="dots">●●○</div>
  </div>
</body></html>
