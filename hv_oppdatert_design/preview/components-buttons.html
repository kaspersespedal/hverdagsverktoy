<!doctype html><html data-theme="carbon"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-sans)}
  body{
    background:
      radial-gradient(70% 90% at 50% 0%, rgba(212,165,116,.12) 0%, transparent 60%),
      linear-gradient(180deg, #160f0c 0%, #0a0706 100%);
    color:var(--ink);
    padding:24px 26px;
    box-sizing:border-box;
    min-height:160px;
  }
  .lab{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:#8a7a64;margin-bottom:18px}

  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}

  /* Base button — premium gloss + persistent glow */
  .btn{
    position:relative;
    border:none;cursor:pointer;
    padding:13px 24px;
    border-radius:10px;
    font:600 13.5px/1 'Inter',sans-serif;
    letter-spacing:-.1px;
    transition:
      transform .25s var(--ease-premium),
      box-shadow .3s var(--ease-premium),
      background .25s var(--ease-premium),
      filter .25s var(--ease-premium);
  }
  .btn::after{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 45%);
    opacity:.7;
  }

  /* Primary — molten amber, persistent glow + hover bloom */
  .primary{
    background:linear-gradient(180deg,#e8c090 0%,#d4a574 50%,#b8885a 100%);
    color:#1a0e05;
    box-shadow:
      0 1px 0 rgba(255,235,200,.4) inset,
      0 -1px 0 rgba(110,63,31,.4) inset,
      0 0 0 1px rgba(212,165,116,.4),
      0 4px 14px rgba(212,165,116,.35),
      0 10px 30px rgba(212,165,116,.22);
  }
  .primary:hover{
    transform:translateY(-2px);
    filter:brightness(1.06);
    box-shadow:
      0 1px 0 rgba(255,235,200,.5) inset,
      0 -1px 0 rgba(110,63,31,.4) inset,
      0 0 0 1px rgba(212,165,116,.55),
      0 6px 22px rgba(212,165,116,.5),
      0 18px 44px rgba(212,165,116,.32),
      0 0 30px rgba(212,165,116,.25);
  }

  /* Secondary — warm graphite with amber edge-glow */
  .secondary{
    background:linear-gradient(180deg,#2a221c 0%,#1a1411 100%);
    color:#e8d9c4;
    box-shadow:
      0 1px 0 rgba(232,217,196,.06) inset,
      0 0 0 1px rgba(212,165,116,.18),
      0 4px 14px rgba(0,0,0,.4),
      0 0 18px rgba(212,165,116,.08);
  }
  .secondary:hover{
    transform:translateY(-2px);
    box-shadow:
      0 1px 0 rgba(232,217,196,.1) inset,
      0 0 0 1px rgba(212,165,116,.4),
      0 6px 22px rgba(0,0,0,.5),
      0 0 28px rgba(212,165,116,.22);
  }

  /* Ghost — invisible until hover, then glows */
  .ghost{
    background:transparent;
    color:#a89682;
    box-shadow:0 0 0 1px rgba(168,150,130,.2);
  }
  .ghost::after{display:none}
  .ghost:hover{
    color:#e8d9c4;
    transform:translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(212,165,116,.35),
      0 0 20px rgba(212,165,116,.18);
  }

  /* Icon spec */
  .btn .ic{display:inline-block;margin-left:6px;transform:translateY(.5px)}

  .meta{margin-top:18px;font-family:var(--font-mono);font-size:10px;color:#5a4d3e;letter-spacing:.3px}
  .meta b{color:#a89682;font-weight:600}
</style></head>
<body>
  <div class="lab">Hover any button — persistent glow blooms on lift</div>
  <div class="row">
    <button class="btn primary">Beregn skatt<span class="ic">→</span></button>
    <button class="btn secondary">Lagre</button>
    <button class="btn ghost">Avbryt</button>
  </div>
  <div class="meta"><b>primary</b> persistent amber glow · <b>hover</b> bloom + lift 2px · <b>250ms</b> premium ease</div>
</body></html>
