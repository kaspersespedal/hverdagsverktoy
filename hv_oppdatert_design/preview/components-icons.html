<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap');
html,body{margin:0;padding:0}
body{
  background:radial-gradient(70% 100% at 50% 0%, rgba(212,165,116,.10) 0%, transparent 60%),
             linear-gradient(180deg, #1a1411 0%, #0c0908 100%);
  color:#e8d9c4;font-family:Inter,sans-serif;padding:26px 24px;margin:0;
  min-height:170px;box-sizing:border-box;
}
.label{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#8a7a64;font-weight:700;margin-bottom:20px}
.row{display:flex;gap:36px;align-items:center;flex-wrap:wrap}
.demo{display:flex;flex-direction:column;align-items:center;gap:14px}

/* Icon button — refined chip */
.btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(212,165,116,.22);
  background:radial-gradient(120% 120% at 30% 20%, #2a221c 0%, #15100d 100%);
  color:#d4a574;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 1px 0 rgba(232,217,196,.06) inset,
    0 4px 14px rgba(0,0,0,.4),
    0 0 14px rgba(212,165,116,.06);
}

/* Plain glyph chip */
.glyph{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:#c9b89e;
}

.cap{font-size:9.5px;color:#7a6a55;letter-spacing:1.4px;text-transform:uppercase;font-weight:700}

/* Complexity beads — true SVG, glowing accent on filled, ghost ring on empty */
.bead-row{display:flex;gap:6px;align-items:center}
.bead{width:10px;height:10px}

/* Sexy detail: subtle drop on each glyph */
.sx{filter:drop-shadow(0 0 6px rgba(212,165,116,.2))}
</style></head>
<body>
  <div class="label">Iconography · 1.5 stroke · 18px grid · soft amber glow</div>
  <div class="row">

    <div class="demo">
      <button class="btn">
        <svg class="sx" viewBox="0 0 18 18" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3.5 6.5V3.5h3M14.5 6.5V3.5h-3M3.5 11.5v3h3M14.5 11.5v3h-3"/>
        </svg>
      </button>
      <div class="cap">Fokus</div>
    </div>

    <div class="demo">
      <div class="glyph">
        <svg class="sx" viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4.5 7.5 9 12 13.5 7.5"/>
        </svg>
      </div>
      <div class="cap">Chev</div>
    </div>

    <div class="demo">
      <div class="glyph">
        <svg class="sx" viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3.5" y1="9" x2="14.5" y2="9"/>
          <polyline points="7.5 5 3.5 9 7.5 13"/>
        </svg>
      </div>
      <div class="cap">Back</div>
    </div>

    <div class="demo">
      <div class="glyph">
        <svg class="sx" viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3.5" y1="9" x2="14.5" y2="9"/>
          <polyline points="10.5 5 14.5 9 10.5 13"/>
        </svg>
      </div>
      <div class="cap">Send</div>
    </div>

    <div class="demo">
      <div class="bead-row">
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-e" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#c8ffd9"/><stop offset=".4" stop-color="#5dd47f"/><stop offset="1" stop-color="#2a8a47"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-e)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="rgba(212,165,116,.22)" stroke-width="1"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="rgba(212,165,116,.22)" stroke-width="1"/></svg>
      </div>
      <div class="cap">Easy</div>
    </div>

    <div class="demo">
      <div class="bead-row">
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-m1" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#fff5c8"/><stop offset=".4" stop-color="#f5c445"/><stop offset="1" stop-color="#9a7212"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-m1)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-m2" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#fff5c8"/><stop offset=".4" stop-color="#f5c445"/><stop offset="1" stop-color="#9a7212"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-m2)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="rgba(212,165,116,.22)" stroke-width="1"/></svg>
      </div>
      <div class="cap">Medium</div>
    </div>

    <div class="demo">
      <div class="bead-row">
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-h1" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#ffd0d0"/><stop offset=".4" stop-color="#e66d6d"/><stop offset="1" stop-color="#8a2828"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-h1)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-h2" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#ffd0d0"/><stop offset=".4" stop-color="#e66d6d"/><stop offset="1" stop-color="#8a2828"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-h2)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
        <svg class="bead" viewBox="0 0 10 10"><defs><radialGradient id="sh-h3" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#ffd0d0"/><stop offset=".4" stop-color="#e66d6d"/><stop offset="1" stop-color="#8a2828"/></radialGradient></defs><circle cx="5" cy="5" r="4" fill="url(#sh-h3)"/><ellipse cx="3.6" cy="3.4" rx="1.6" ry="1" fill="rgba(255,255,255,.55)"/></svg>
      </div>
      <div class="cap">Hard</div>
    </div>

  </div>

  <!-- shared filter for soft bead glow -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="go" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.2"/>
      </filter>
    </defs>
  </svg>

  <style>
    .bead-row svg:has(stop[stop-color="#5dd47f"]){filter:drop-shadow(0 0 4px rgba(93,212,127,.55))}
    .bead-row svg:has(stop[stop-color="#f5c445"]){filter:drop-shadow(0 0 4px rgba(245,196,69,.5))}
    .bead-row svg:has(stop[stop-color="#e66d6d"]){filter:drop-shadow(0 0 4px rgba(230,109,109,.5))}
  </style>
</body></html>
