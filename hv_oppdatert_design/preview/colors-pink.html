<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-sans)}
  body{
    background:linear-gradient(180deg,#fffafc 0%,#fef4f7 100%);
    color:#7a4a5e;
    padding:22px 24px 24px;
    box-sizing:border-box;
  }
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .lab{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:#c89ab0}
  .meta{font-family:var(--font-mono);font-size:10px;color:#d4b0c0;letter-spacing:.4px}

  .grid{display:grid;grid-template-columns:1.7fr 1fr 1fr;gap:10px}
  .sw{
    border-radius:11px;padding:14px 14px 12px;
    min-height:96px;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;
    border:1px solid rgba(216,140,170,.14);
  }
  .nm{font-size:11.5px;font-weight:700;letter-spacing:-.1px}
  .hex{font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:2px}
  .var{font-family:var(--font-mono);font-size:9.5px;opacity:.55;margin-top:6px}

  .accent{
    grid-row:span 2;
    background:linear-gradient(135deg,#fbc4d6 0%,#f4a8c0 55%,#e88aab 100%);
    color:#5e2a40;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 0 0 1px rgba(244,168,192,.35),
      0 8px 28px rgba(244,168,192,.32),
      0 18px 48px rgba(244,168,192,.22);
    padding:20px 18px;
    min-height:auto;
  }
  .accent .nm{font-size:14px}
  .accent .hex{font-size:11.5px;opacity:.75;margin-top:4px}
  .accent .tag{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;opacity:.55;margin-bottom:auto}
  .accent .glow-orb{position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,transparent 65%);pointer-events:none}

  .bg{background:#fffafc;color:#7a4a5e;border-color:#f5dde6}
  .surf{background:#fff5f8;color:#7a4a5e;border-color:#f5dde6}
  .surf2{background:#fbe9ef;color:#7a4a5e;border-color:#f0c8d6}
  .ink{background:transparent;color:#7a4a5e;border:1px dashed #e8c0d0}
  .ink2{background:transparent;color:#a8788c;border:1px dashed #e8c0d0}
  .accent-l{background:#fcd9e3;color:#7a4a5e}
  .accent-d{background:#e892ad;color:#5e2a40}
</style></head>
<body>
  <div class="head">
    <div class="lab">Pink · soft rose</div>
    <div class="meta">data-theme="pink"</div>
  </div>
  <div class="grid">
    <div class="sw accent">
      <div class="glow-orb"></div>
      <div class="tag">Signature accent</div>
      <div>
        <div class="nm">Soft rose</div>
        <div class="hex">#F4A8C0</div>
        <div class="var">--accent</div>
      </div>
    </div>
    <div class="sw bg"><div class="nm">bg</div><div class="hex">#FFFAFC</div><div class="var">--bg</div></div>
    <div class="sw surf"><div class="nm">surface</div><div class="hex">#FFF5F8</div><div class="var">--surface</div></div>
    <div class="sw surf2"><div class="nm">surface 2</div><div class="hex">#FBE9EF</div><div class="var">--surface2</div></div>
    <div class="sw accent-l"><div class="nm">accent · light</div><div class="hex">#FCD9E3</div><div class="var">--accent-l</div></div>
    <div class="sw accent-d"><div class="nm">accent · deep</div><div class="hex">#E892AD</div><div class="var">--accent-d</div></div>
    <div class="sw ink"><div class="nm">ink</div><div class="hex">#7A4A5E</div><div class="var">--ink</div></div>
    <div class="sw ink2"><div class="nm">ink 2</div><div class="hex">#A8788C</div><div class="var">--ink2</div></div>
  </div>
</body></html>
