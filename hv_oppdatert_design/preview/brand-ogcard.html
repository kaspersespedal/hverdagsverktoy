<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,500&display=swap');
html,body{margin:0;padding:0}
body{
  background:#0a0807;
  font-family:Inter,sans-serif;color:#e8d9c4;
  display:flex;align-items:center;justify-content:center;
  padding:0;min-height:368px;
}

/* 1200×630 OG card scaled into the preview */
.og-wrap{
  width:1200px;height:630px;
  transform:scale(.5);transform-origin:top left;
  position:absolute;top:0;left:50%;margin-left:-300px;
}
.og{
  width:1200px;height:630px;position:relative;overflow:hidden;
  background:
    radial-gradient(60% 80% at 85% 15%, rgba(212,165,116,.22) 0%, transparent 60%),
    radial-gradient(50% 60% at 10% 100%, rgba(196,94,44,.15) 0%, transparent 65%),
    linear-gradient(165deg, #1a1411 0%, #0c0908 100%);
}
/* film grain */
.og::after{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.45;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.3'/></svg>");
}

.frame{
  position:absolute;inset:60px;
  border:1px solid rgba(212,165,116,.18);
  border-radius:18px;
}

.eyebrow{
  position:absolute;top:104px;left:104px;
  font-size:14px;letter-spacing:3px;text-transform:uppercase;font-weight:700;
  color:#8a7a64;display:flex;align-items:center;gap:14px;
}
.eyebrow .dash{width:36px;height:1px;background:#d4a574}

.brand{
  position:absolute;top:160px;left:104px;right:104px;
  font-family:'Playfair Display',serif;font-style:italic;font-weight:500;
  font-size:128px;line-height:.95;letter-spacing:-3px;
  color:#e8d9c4;
}

.tag{
  position:absolute;top:340px;left:104px;right:200px;
  font-size:24px;font-weight:400;color:#a89682;line-height:1.45;letter-spacing:-.2px;
  max-width:760px;
}

.foot{
  position:absolute;bottom:96px;left:104px;right:104px;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.tools{display:flex;gap:34px;font-size:14px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:#7a6a55}
.tools span{position:relative}
.tools span+span::before{
  content:"";position:absolute;left:-18px;top:50%;width:4px;height:4px;border-radius:50%;
  background:#d4a574;transform:translateY(-50%);opacity:.7;
}

.mark{
  position:absolute;top:84px;right:104px;
  width:88px;height:88px;border-radius:20px;
  background:
    radial-gradient(120% 100% at 0% 0%, #2a1f17 0%, transparent 60%),
    linear-gradient(140deg,#0f0a07 0%,#1a1411 50%,#241d18 100%);
  box-shadow:
    0 1px 0 rgba(232,217,196,.08) inset,
    0 0 0 1px rgba(212,165,116,.25),
    0 8px 28px rgba(0,0,0,.5),
    0 0 28px rgba(212,165,116,.18);
  display:flex;align-items:center;justify-content:center;
}

/* aurora glow blob */
.aurora{
  position:absolute;top:50%;right:-120px;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,192,144,.25) 0%,rgba(196,94,44,.08) 50%,transparent 75%);
  filter:blur(60px);transform:translateY(-50%);pointer-events:none;
}
</style></head>
<body>
  <div class="og-wrap"><div class="og">
    <div class="aurora"></div>

    <div class="frame"></div>

    <div class="mark">
      <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="og-g" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#f0d4ad"/>
            <stop offset="1" stop-color="#b8885a"/>
          </linearGradient>
        </defs>
        <rect x="14" y="12" width="8" height="40" rx="4" fill="url(#og-g)"/>
        <rect x="42" y="12" width="8" height="40" rx="4" fill="url(#og-g)"/>
        <rect x="22" y="28" width="20" height="8" rx="2" fill="url(#og-g)"/>
      </svg>
    </div>

    <div class="eyebrow"><span class="dash"></span><span>Hverdagsøkonomi · Norge</span></div>
    <div class="brand">Hverdagsverktøy</div>
    <div class="tag">Praktiske verktøy for skatt, lån og kalkyler — bygget for hverdagen.</div>

    <div class="foot">
      <div class="tools">
        <span>Skatt</span><span>Boliglån</span><span>Kalkulator</span><span>Avgift</span>
      </div>
      <div style="font-size:14px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:#d4a574">●●●</div>
    </div>
  </div></div>
</body></html>
