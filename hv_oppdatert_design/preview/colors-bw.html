<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:var(--font-sans)}
  body{
    background:radial-gradient(120% 100% at 0% 0%, #e8e6e3 0%, #d8d5d0 50%, #c4c0ba 100%);
    color:#3a3733;
    padding:22px 24px 24px;
    box-sizing:border-box;
    position:relative;
  }
  /* atmospheric haze */
  body::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 80% 100%, rgba(80,75,70,.18) 0%, transparent 70%),
      radial-gradient(40% 40% at 20% 0%, rgba(255,255,255,.35) 0%, transparent 70%);
  }
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;position:relative}
  .lab{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:#7a7570}
  .meta{font-family:var(--font-mono);font-size:10px;color:#9a948e;letter-spacing:.4px}

  .grid{display:grid;grid-template-columns:1.7fr 1fr 1fr;gap:10px;position:relative}
  .sw{
    border-radius:11px;padding:14px 14px 12px;
    min-height:96px;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;
    border:1px solid rgba(60,55,50,.08);
    backdrop-filter:blur(2px);
  }
  .nm{font-size:11.5px;font-weight:700;letter-spacing:-.1px}
  .hex{font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:2px}
  .var{font-family:var(--font-mono);font-size:9.5px;opacity:.55;margin-top:6px}

  .accent{
    grid-row:span 2;
    background:linear-gradient(160deg,#5a554f 0%,#403c37 50%,#2a2724 100%);
    color:#e8e6e3;
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 0 0 1px rgba(60,55,50,.2),
      0 8px 28px rgba(40,38,35,.3),
      0 18px 48px rgba(40,38,35,.2);
    padding:20px 18px;
    min-height:auto;
  }
  .accent .nm{font-size:14px}
  .accent .hex{font-size:11.5px;opacity:.6;margin-top:4px}
  .accent .tag{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;opacity:.45;margin-bottom:auto}
  .accent .glow-orb{position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(220,215,208,.18) 0%,transparent 65%);pointer-events:none}

  .bg{background:#dcd9d4;color:#3a3733;border-color:rgba(60,55,50,.1)}
  .surf{background:#e6e3de;color:#3a3733;border-color:rgba(60,55,50,.1)}
  .surf2{background:#cfcbc4;color:#3a3733;border-color:rgba(60,55,50,.14)}
  .ink{background:transparent;color:#3a3733;border:1px dashed rgba(60,55,50,.28)}
  .ink2{background:transparent;color:#6a655f;border:1px dashed rgba(60,55,50,.28)}
  .accent-l{background:#7a756f;color:#e8e6e3}
  .accent-d{background:#1a1816;color:#dcd9d4}
</style></head>
<body>
  <div class="head">
    <div class="lab">B&amp;W · smokey monochrome</div>
    <div class="meta">data-theme="bw"</div>
  </div>
  <div class="grid">
    <div class="sw accent">
      <div class="glow-orb"></div>
      <div class="tag">Signature accent</div>
      <div>
        <div class="nm">Smoke charcoal</div>
        <div class="hex">#403C37</div>
        <div class="var">--accent · --ink</div>
      </div>
    </div>
    <div class="sw bg"><div class="nm">bg</div><div class="hex">#DCD9D4</div><div class="var">--bg</div></div>
    <div class="sw surf"><div class="nm">surface</div><div class="hex">#E6E3DE</div><div class="var">--surface</div></div>
    <div class="sw surf2"><div class="nm">surface 2</div><div class="hex">#CFCBC4</div><div class="var">--surface2</div></div>
    <div class="sw accent-l"><div class="nm">smoke · light</div><div class="hex">#7A756F</div><div class="var">--ink2 / accent-l</div></div>
    <div class="sw accent-d"><div class="nm">smoke · deep</div><div class="hex">#1A1816</div><div class="var">--accent-d</div></div>
    <div class="sw ink"><div class="nm">ink</div><div class="hex">#3A3733</div><div class="var">--ink</div></div>
    <div class="sw ink2"><div class="nm">ink 2</div><div class="hex">#6A655F</div><div class="var">--ink2</div></div>
  </div>
</body></html>
