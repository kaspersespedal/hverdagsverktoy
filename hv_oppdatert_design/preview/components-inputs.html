<!doctype html><html data-theme="carbon"><head><meta charset="utf-8">
<link rel="stylesheet" href="../components.css">
<style>
body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans)}
.lab{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px}
.fg{display:flex;flex-direction:column;gap:6px}
label{font-size:12.5px;font-weight:600;color:var(--ink2)}
.help{font-size:11.5px;color:var(--ink3)}
input.hv-input.focused{border-color:rgba(var(--glow-rgb),.5);box-shadow:0 0 0 2px rgba(var(--glow-rgb),.08),0 0 6px rgba(var(--glow-rgb),.06)}
</style></head>
<body>
  <div class="lab">Default state · focused state — focus ring is the same accent glow</div>
  <div class="row">
    <div class="fg">
      <label>Bruttolønn (kr)</label>
      <input class="hv-input" value="650 000">
      <span class="help">Årlig, før skatt</span>
    </div>
    <div class="fg">
      <label>Trinnskattnivå</label>
      <input class="hv-input focused" value="Trinn 3 — 13,7 %">
      <span class="help">Stortingets vedtak STV-2025</span>
    </div>
  </div>
</body></html>
