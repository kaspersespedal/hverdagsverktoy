<style>
  :root{
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;

    --ink:#ececea;
    --ink2:#a8a39a;
    --ink3:#797469;
    --ink4:#54514a;
    --bg:#0d0d0c;
    --surface:#131312;
    --surface-2:#191917;
    --accent:#c89968;
    --accent-2:#d8ad7e;
    --line:rgba(255,255,255,.06);
    --line-2:rgba(255,255,255,.10);
    --line-warm:rgba(200,153,104,.18);

    --pos:#5fa978;
    --neg:#c46a6a;

    --ease: cubic-bezier(.22, 1, .36, 1);
  }
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--font-sans);
    font-size:15px;line-height:1.55;
    min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    overflow-x:hidden;
  }
  .container{max-width:1120px;margin:0 auto;padding:0 32px}
  ::selection{background:rgba(200,153,104,.28);color:#fff}

  /* ── NAV ─────────────────────────────────────────── */
  .nav-wrap{
    position:sticky;top:0;z-index:50;
    background:rgba(13,13,12,.78);
    backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid var(--line);
  }
  nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:24px}
  .brand-row{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink)}
  .mark{
    width:28px;height:28px;border-radius:5px;
    background:#1a1714;
    border:1px solid var(--line-warm);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .wordmark{
    font-family:var(--font-serif);font-weight:500;
    font-size:18px;letter-spacing:-.2px;line-height:1;color:var(--ink);
  }
  .nav-back{
    font-size:13px;color:var(--ink3);text-decoration:none;
    display:flex;align-items:center;gap:6px;
    padding:7px 11px;border-radius:5px;
    border:1px solid var(--line-2);
    transition:color .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease);
  }
  .nav-back:hover{color:var(--ink);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.02)}

  /* ── TABS ────────────────────────────────────────── */
  .tabs-wrap{
    border-bottom:1px solid var(--line);
    background:rgba(13,13,12,.78);
    position:sticky;top:64px;z-index:40;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .tabs{
    display:flex;gap:2px;padding:6px 0;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex-shrink:0;background:transparent;border:0;
    padding:10px 14px;border-radius:4px;cursor:pointer;
    font:500 13px/1 var(--font-sans);letter-spacing:-.05px;
    color:var(--ink3);
    display:flex;align-items:center;gap:8px;
    transition:color .2s var(--ease), background .2s var(--ease);
    position:relative;
    text-decoration:none;
  }
  .tab:hover{color:var(--ink2);background:rgba(255,255,255,.03)}
  .tab[aria-selected="true"]{
    color:var(--ink);
  }
  .tab[aria-selected="true"]::after{
    content:"";position:absolute;left:14px;right:14px;bottom:-7px;height:2px;
    background:var(--accent);
  }
  .tab .tab-icon{
    width:14px;height:14px;color:currentColor;opacity:.6;
  }
  .tab[aria-selected="true"] .tab-icon{opacity:1;color:var(--accent)}

  /* ── PAGE HERO ───────────────────────────────────── */
  .page-hero{
    padding:56px 0 36px;text-align:left;
    border-bottom:1px solid var(--line);
  }
  .page-hero .container{display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:end}

  .page-eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font:600 11px/1 var(--font-sans);letter-spacing:1.8px;text-transform:uppercase;
    color:var(--ink3);margin-bottom:18px;
  }
  .page-eyebrow a{color:var(--ink3);text-decoration:none;transition:color .2s var(--ease)}
  .page-eyebrow a:hover{color:var(--accent)}
  .page-eyebrow .arrow{color:var(--ink4);font-weight:400}
  .page-eyebrow .current{color:var(--ink2)}

  h1.page-title{
    font-family:var(--font-serif);font-weight:500;
    font-size:clamp(36px, 4.6vw, 54px);line-height:1.05;letter-spacing:-1.2px;
    margin:0 0 14px;color:var(--ink);
  }
  h1.page-title em{font-style:italic;font-weight:500;color:var(--accent-2)}
  .page-lead{
    font-size:14px;line-height:1.55;color:var(--ink2);margin:0;max-width:58ch;
  }

  .page-stats{
    display:flex;flex-direction:column;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }
  .page-stat{
    display:flex;align-items:baseline;justify-content:space-between;gap:16px;
    padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .page-stat:last-child{border-bottom:none}
  .page-stat .l{
    font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
    color:var(--ink3);
  }
  .page-stat .v{
    font-family:var(--font-serif);font-weight:500;
    font-size:30px;line-height:1;letter-spacing:-.6px;color:var(--ink);
    font-variant-numeric:tabular-nums lining-nums;
    white-space:nowrap;
  }
  .page-stat .v .u{
    font-family:var(--font-sans);font-weight:500;
    font-size:13px;color:var(--ink3);letter-spacing:0;
    margin-left:4px;
  }

  /* ── FILTER BAR ──────────────────────────────────── */
  .filter-bar{
    margin:28px 0 4px;
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  .filter-input{
    flex:1;min-width:240px;position:relative;
  }
  .filter-input input{
    width:100%;background:var(--surface);
    border:1px solid var(--line-2);border-radius:6px;
    padding:12px 14px 12px 40px;
    color:var(--ink);font:400 14px/1 var(--font-sans);
    outline:none;
    transition:border-color .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
  }
  .filter-input input::placeholder{color:var(--ink3)}
  .filter-input input:focus{
    border-color:rgba(200,153,104,.5);
    background:var(--surface-2);
    box-shadow:0 0 0 3px rgba(200,153,104,.10);
  }
  .filter-input svg{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none;
  }
  .chip-row{display:flex;gap:4px;flex-wrap:wrap}
  .chip{
    background:transparent;border:1px solid var(--line-2);
    color:var(--ink2);font:500 12px/1 var(--font-sans);
    padding:9px 12px;border-radius:5px;cursor:pointer;
    transition:all .2s var(--ease);
    text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip:hover{border-color:rgba(255,255,255,.22);color:var(--ink)}
  .chip.active{background:rgba(200,153,104,.08);border-color:rgba(200,153,104,.32);color:var(--ink)}
  .chip .ct{color:var(--ink4);font-weight:500}

  /* ── TOOL CARDS ──────────────────────────────────── */
  section.tools{padding:0 0 56px}
  .col-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:16px;
    height:36px;
    padding-bottom:14px;margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .col-head h2, .col-head h3{
    font-family:var(--font-sans);font-size:11px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;color:var(--ink3);
    margin:0;
  }
  .col-head .count{font-size:12.5px;color:var(--ink3);font-variant-numeric:tabular-nums}

  .tool-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:6px;overflow:hidden;
  }
  .tool-card{
    position:relative;background:var(--surface);padding:22px 24px;
    text-decoration:none;color:var(--ink);
    display:flex;flex-direction:column;gap:6px;
    transition:background .2s var(--ease);
    min-height:108px;
  }
  .tool-card:hover{background:var(--surface-2)}
  .tool-card .tc-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:2px;
  }
  .tool-card h3{
    font-family:var(--font-serif);font-weight:500;font-size:18px;
    line-height:1.25;letter-spacing:-.25px;margin:0;color:var(--ink);
    transition:color .2s var(--ease);
  }
  .tool-card:hover h3{color:var(--accent-2)}
  .tool-card p{
    font-size:13px;line-height:1.55;color:var(--ink3);margin:0;
  }
  .tool-card .tc-tag{
    font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
    color:var(--accent);
    background:rgba(200,153,104,.08);
    padding:3px 7px;border-radius:3px;
    flex-shrink:0;
    border:1px solid var(--line-warm);
  }
  .tool-card .arrow{
    align-self:flex-start;color:var(--ink4);margin-top:2px;
    transition:color .25s var(--ease), transform .25s var(--ease);
  }
  .tool-card:hover .arrow{color:var(--accent);transform:translate(2px,-2px)}

  /* ── REFERENCE PANEL ─────────────────────────────── */
  .page-grid{
    display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start;
    padding-top:24px;
  }
  .ref-col{display:flex;flex-direction:column}
  .ref-panel{
    background:var(--surface);
    border:1px solid var(--line);border-radius:6px;
    padding:6px 20px;
  }
  .ref-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:10px 0;border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .ref-row:last-child{border-bottom:none}
  .ref-row .label{color:var(--ink2)}
  .ref-row .val{
    font-family:var(--font-serif);font-weight:500;
    color:var(--ink);font-variant-numeric:tabular-nums;
  }
  .ref-row .val.accent{color:var(--accent-2)}

  .ref-cta{
    margin-top:16px;
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 14px;border-radius:5px;
    background:transparent;border:1px solid var(--line-2);
    color:var(--ink2);text-decoration:none;
    font:600 12px/1 var(--font-sans);letter-spacing:.4px;
    transition:background .2s var(--ease), border-color .2s var(--ease), color .2s var(--ease);
  }
  .ref-cta:hover{background:rgba(200,153,104,.06);border-color:rgba(200,153,104,.32);color:var(--ink)}
  .ref-cta svg{color:var(--accent);transition:transform .2s var(--ease)}
  .ref-cta:hover svg{transform:translateX(2px)}

  /* ── FOOTER ──────────────────────────────────────── */
  footer{border-top:1px solid var(--line);padding:32px 0 36px;color:var(--ink4);font-size:12.5px}
  .foot{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .foot em{font-style:italic;color:var(--ink4)}

  /* ── PAGE TRANSITION ─────────────────────────────── */
  .page-content{
    animation:pageIn .35s var(--ease) both;
  }
  @keyframes pageIn{
    from{opacity:0;transform:translateY(6px)}
    to{opacity:1;transform:none}
  }

  @media (max-width: 880px){
    .page-grid{grid-template-columns:1fr}
    .page-hero .container{grid-template-columns:1fr;align-items:start;gap:24px}
    .page-stats{align-self:stretch}
    .tool-grid{grid-template-columns:1fr}
    .tabs-wrap{top:60px}
  }
  @media (max-width: 560px){
    .container{padding:0 22px}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
    html{scroll-behavior:auto}
  }
</style>
</head>

function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}

function renderPage(key){
  var p = PAGES[key]; if(!p) return;
  var statsHtml = p.stats.map(function(s){
    var unit = s.u ? '<span class="u">'+escapeHtml(s.u)+'</span>' : '';
    return '<div class="page-stat"><span class="l">'+escapeHtml(s.l)+'</span><span class="v">'+escapeHtml(s.v)+unit+'</span></div>';
  }).join('');

  var toolsHtml = p.tools.map(function(t){
    return '<a href="#" class="tool-card">'
      + '<div class="tc-head"><h3>'+escapeHtml(t.n)+'</h3>'
      + (t.tag ? '<span class="tc-tag">'+escapeHtml(t.tag)+'</span>' : '')
      + '</div>'
      + '<p>'+escapeHtml(t.d)+'</p>'
      + '<svg class="arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="11" x2="11" y2="3"/><polyline points="5 3 11 3 11 9"/></svg>'
      + '</a>';
  }).join('');

  var refRows = p.ref.rows.map(function(r){
    return '<div class="ref-row"><span class="label">'+escapeHtml(r.l)+'</span><span class="val'+(r.accent?' accent':'')+'">'+escapeHtml(r.v)+'</span></div>';
  }).join('');

  var html = ''
    + '<section class="page-hero" data-screen-label="'+key+' Hero">'
    + '  <div class="container">'
    + '    <div>'
    + '      <div class="page-eyebrow"><a href="Homepage.html">Forsiden</a><span class="arrow">/</span><span class="current">'+escapeHtml(p.crumb)+'</span></div>'
    + '      <h1 class="page-title">'+p.title+'</h1>'
    + '      <p class="page-lead">'+escapeHtml(p.lead)+'</p>'
    + '    </div>'
    + '    <div class="page-stats">'+statsHtml+'</div>'
    + '  </div>'
    + '</section>'
    + '<div class="container">'
    + '  <div class="filter-bar">'
    + '    <label class="filter-input"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6"/><line x1="14" y1="14" x2="18" y2="18"/></svg>'
    + '      <input type="text" placeholder="Filtrer verktøy i denne kategorien…">'
    + '    </label>'
    + '    <div class="chip-row">'
    + '      <button class="chip active">Alle <span class="ct">'+p.tools.length+'</span></button>'
    + '      <button class="chip">Populære</button>'
    + '      <button class="chip">Nye</button>'
    + '    </div>'
    + '  </div>'
    + '  <div class="page-grid">'
    + '    <section class="tools">'
    + '      <div class="col-head"><h2>Verktøy</h2><span class="count">'+p.tools.length+' tilgjengelige</span></div>'
    + '      <div class="tool-grid">'+toolsHtml+'</div>'
    + '    </section>'
    + '    <aside class="ref-col">'
    + '      <div class="col-head"><h3>'+escapeHtml(p.ref.title)+'</h3></div>'
    + '      <div class="ref-panel">'
    + '        <div class="ref-rows">'+refRows+'</div>'
    + '      </div>'
    + '      <a href="#" class="ref-cta"><span>'+escapeHtml(p.ref.cta)+'</span><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="2.5" y1="7" x2="11" y2="7"/><polyline points="7.5 3.5 11 7 7.5 10.5"/></svg></a>'
    + '    </aside>'
    + '  </div>'
    + '</div>';

  var host = document.getElementById('pageHost');
  host.innerHTML = '<div class="page-content" data-screen-label="'+key+'">'+html+'</div>';

  document.querySelectorAll('.tab').forEach(function(t){
    t.setAttribute('aria-selected', t.dataset.tab === key ? 'true' : 'false');
  });
  try{ history.replaceState(null, '', '#'+key); }catch(e){}
  window.scrollTo(0,0);
}

document.addEventListener('click', function(e){
  var tab = e.target.closest('.tab');
  if(!tab) return;
  e.preventDefault();
  var key = tab.getAttribute('data-tab');
  if(key && PAGES[key]) renderPage(key);
});

window.addEventListener('hashchange', function(){
  var k = location.hash.replace('#','');
  if(PAGES[k]) renderPage(k);
});

var initial = location.hash.replace('#','');
renderPage(PAGES[initial] ? initial : 'personlig');
</script>
